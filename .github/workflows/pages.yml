name: Validate audit dashboard and documentation

on:
  pull_request:
    paths:
      - "audit/**"
      - "docs/**"
      - "tests/**"
      - "README.md"
      - "taskchain.md"
      - "punchlist.md"
      - "release.md"
      - "changelog.md"
      - ".github/workflows/pages.yml"

permissions:
  contents: read

concurrency:
  group: justiceforme-documentation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUBMITTED_SHA: ${{ github.event.pull_request.head.sha }}
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out submitted source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.SUBMITTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Assert exact source and deployment prohibition
        shell: bash
        run: |
          set -euo pipefail
          actual_sha="$(git rev-parse HEAD)"
          test -n "$SUBMITTED_SHA"
          test "$actual_sha" = "$SUBMITTED_SHA"
          test -z "$(git status --porcelain)"
          required=(
            audit/linux-privilege-audit.sh
            docs/index.html
            docs/guide.html
            docs/app.js
            docs/styles.css
            docs/project-overview.md
            docs/architecture.md
            docs/onboarding.md
            docs/developer-guide.md
            docs/report-schema.md
            docs/security-and-evidence.md
            tests/test_documentation.py
            README.md
            taskchain.md
            punchlist.md
            release.md
            changelog.md
          )
          for path in "${required[@]}"; do test -f "$path"; done
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('.github/workflows/pages.yml').read_text(encoding='utf-8')
          trigger_section, remainder = text.split('permissions:', 1)
          assert not re.search(r'(?m)^\s*push\s*:', trigger_section)
          assert not re.search(r'(?m)^\s*workflow_dispatch\s*:', trigger_section)
          permission_section = remainder.split('concurrency:', 1)[0]
          permission_lines = [line.strip() for line in permission_section.splitlines() if ':' in line]
          assert permission_lines == ['contents: read'], permission_lines
          uses = [line.split('uses:', 1)[1].strip() for line in text.splitlines() if line.strip().startswith('uses:')]
          prohibited = ('actions/deploy-pages@', 'actions/configure-pages@', 'actions/upload-pages-artifact@')
          assert not any(action.startswith(prohibited) for action in uses), uses
          print('Deployment authority is structurally absent.')
          PY
          evidence="$RUNNER_TEMP/justiceforme-documentation-evidence"
          mkdir -p "$evidence"
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$actual_sha"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
            printf 'deployment_authority=absent\n'
            printf 'report_schema=1.0\n'
          } | tee "$evidence/source-identity.txt"

      - name: Validate collector and dashboard sources
        id: sourcecheck
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/justiceforme-documentation-evidence"
          {
            bash -n audit/linux-privilege-audit.sh
            node --check docs/app.js
            python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class PageParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.lang = False
                  self.main = 0
                  self.h1 = 0
                  self.labels = 0
                  self.local_scripts = []
                  self.local_styles = []

              def handle_starttag(self, tag, attrs):
                  values = dict(attrs)
                  if tag == "html" and values.get("lang"):
                      self.lang = True
                  elif tag == "main":
                      self.main += 1
                  elif tag == "h1":
                      self.h1 += 1
                  elif tag == "label":
                      self.labels += 1
                  elif tag == "script" and values.get("src"):
                      self.local_scripts.append(values["src"])
                  elif tag == "link" and values.get("rel") == "stylesheet":
                      self.local_styles.append(values.get("href", ""))

          root = Path("docs")
          for name in ("index.html", "guide.html"):
              parser = PageParser()
              parser.feed((root / name).read_text(encoding="utf-8"))
              assert parser.lang, f"{name}: html language is missing"
              assert parser.main == 1, f"{name}: exactly one main landmark required"
              assert parser.h1 == 1, f"{name}: exactly one h1 required"
              if name == "index.html":
                  assert parser.labels >= 1, "file input requires a label"
              for target in parser.local_scripts + parser.local_styles:
                  assert "://" not in target and not target.startswith("//"), target
                  assert (root / target).is_file(), target
          print("Dashboard and guide source validation passed.")
          PY
          } > "$evidence/source-validation.txt" 2>&1
          status=$?
          cat "$evidence/source-validation.txt"
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run documentation and governance regressions
        id: doctests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/justiceforme-documentation-evidence"
          python3 -m unittest discover -s tests -p 'test_*.py' -v \
            > "$evidence/documentation-tests.txt" 2>&1
          status=$?
          cat "$evidence/documentation-tests.txt"
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record deterministic inputs and source integrity
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/justiceforme-documentation-evidence"
          {
            printf 'bash=%s\n' "$(bash --version | head -1)"
            printf 'node=%s\n' "$(node --version)"
            printf 'python=%s\n' "$(python3 --version 2>&1)"
            printf 'source_validation_status=%s\n' "${{ steps.sourcecheck.outputs.status || 'not-run' }}"
            printf 'documentation_test_status=%s\n' "${{ steps.doctests.outputs.status || 'not-run' }}"
            printf 'generated_utc=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } | tee "$evidence/run-summary.txt"
          find audit docs tests -type f -print0 | sort -z | xargs -0 sha256sum > "$evidence/input-sha256.txt"
          sha256sum README.md taskchain.md punchlist.md release.md changelog.md .github/workflows/pages.yml >> "$evidence/input-sha256.txt"
          find "$evidence" -maxdepth 1 -type f ! -name evidence-sha256.txt -print0 \
            | sort -z \
            | xargs -0 sha256sum > "$evidence/evidence-sha256.txt"
          git diff --exit-code
          git diff --cached --exit-code
          test -z "$(git status --porcelain)"

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: justiceforme-documentation-validation-${{ env.SUBMITTED_SHA }}
          path: ${{ runner.temp }}/justiceforme-documentation-evidence
          if-no-files-found: error
          retention-days: 30

      - name: Fail when validation is incomplete or invalid
        if: always()
        shell: bash
        env:
          SOURCE_STATUS: ${{ steps.sourcecheck.outputs.status }}
          DOC_STATUS: ${{ steps.doctests.outputs.status }}
        run: |
          set -euo pipefail
          test "$SOURCE_STATUS" = "0"
          test "$DOC_STATUS" = "0"
