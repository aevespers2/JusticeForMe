name: Validate audit dashboard and documentation

on:
  pull_request:
    paths:
      - "audit/**"
      - "docs/**"
      - "README.md"
      - "taskchain.md"
      - "punchlist.md"
      - "release.md"
      - "changelog.md"
      - ".github/workflows/pages.yml"

permissions:
  contents: read

concurrency:
  group: justiceforme-documentation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUBMITTED_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - name: Check out submitted source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.SUBMITTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Assert exact source and deployment prohibition
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          actual_sha="$(git rev-parse HEAD)"
          test -n "$SUBMITTED_SHA"
          test "$actual_sha" = "$SUBMITTED_SHA"
          test -z "$(git status --porcelain)"
          required=(
            audit/linux-privilege-audit.sh
            docs/index.html
            docs/guide.html
            docs/app.js
            docs/styles.css
            docs/reference/project-overview.md
            docs/reference/architecture.md
            docs/reference/report-contract.md
            docs/reference/developer-onboarding.md
            docs/reference/operations-and-recovery.md
            docs/reference/obstruction-and-gluing.md
            README.md
            taskchain.md
            punchlist.md
            release.md
            changelog.md
          )
          for path in "${required[@]}"; do test -s "$path"; done
          ! grep -Eq 'pages:[[:space:]]*write|id-token:[[:space:]]*write|deploy-pages|configure-pages|upload-pages-artifact|workflow_dispatch|^[[:space:]]*push:' .github/workflows/pages.yml
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$actual_sha"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
            printf 'deployment_authority=absent\n'
            printf 'required_documentation=%s\n' "${#required[@]}"
          } | tee evidence/source-identity.txt

      - name: Validate collector, dashboard, guide, and links
        id: sourcecheck
        continue-on-error: true
        shell: bash
        run: |
          set +e
          {
            bash -n audit/linux-privilege-audit.sh
            node --check docs/app.js
            python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urlsplit

          class PageParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.lang = False
                  self.main = 0
                  self.h1 = 0
                  self.labels = 0
                  self.buttons = 0
                  self.scripts = []
                  self.styles = []
                  self.links = []

              def handle_starttag(self, tag, attrs):
                  values = dict(attrs)
                  if tag == "html" and values.get("lang"):
                      self.lang = True
                  elif tag == "main":
                      self.main += 1
                  elif tag == "h1":
                      self.h1 += 1
                  elif tag == "label":
                      self.labels += 1
                  elif tag == "button":
                      self.buttons += 1
                  elif tag == "script" and values.get("src"):
                      self.scripts.append(values["src"])
                  elif tag == "link" and values.get("rel") == "stylesheet":
                      self.styles.append(values.get("href", ""))
                  elif tag == "a" and values.get("href"):
                      self.links.append(values["href"])

          root = Path("docs")

          index = PageParser()
          index.feed((root / "index.html").read_text(encoding="utf-8"))
          assert index.lang
          assert index.main == 1
          assert index.h1 == 1
          assert index.labels >= 1
          assert index.buttons >= 1
          assert index.scripts == ["app.js"], index.scripts
          assert index.styles == ["styles.css"], index.styles
          assert "guide.html" in index.links

          guide = PageParser()
          guide.feed((root / "guide.html").read_text(encoding="utf-8"))
          assert guide.lang
          assert guide.main == 1
          assert guide.h1 == 1
          assert guide.scripts == [], guide.scripts
          assert guide.styles == ["styles.css"], guide.styles

          for page, parser in ((root / "index.html", index), (root / "guide.html", guide)):
              for target in parser.scripts + parser.styles + parser.links:
                  parsed = urlsplit(target)
                  if parsed.scheme or parsed.netloc or target.startswith("//"):
                      raise AssertionError(f"external resource not allowed in {page}: {target}")
                  path = parsed.path
                  if not path or path.startswith("#"):
                      continue
                  resolved = (page.parent / path).resolve()
                  assert root.resolve() in resolved.parents or resolved == root.resolve(), target
                  assert resolved.is_file(), f"missing local target: {target}"

          coordination = [Path(name) for name in ("README.md", "taskchain.md", "punchlist.md", "release.md", "changelog.md")]
          for path in coordination:
              text = path.read_text(encoding="utf-8")
              assert "JusticeForMe" in text or path.name != "README.md"
              assert len(text.splitlines()) >= 10, path

          print("Collector, dashboard, guide, and documentation validation passed.")
          PY
          } > evidence/source-validation.txt 2>&1
          status=$?
          cat evidence/source-validation.txt
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Record exact-head evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            printf 'bash=%s\n' "$(bash --version | head -1)"
            printf 'node=%s\n' "$(node --version)"
            printf 'python=%s\n' "$(python3 --version 2>&1)"
            printf 'source_validation_status=%s\n' "${{ steps.sourcecheck.outputs.status || 'not-run' }}"
            printf 'generated_utc=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } | tee evidence/run-summary.txt
          find evidence -maxdepth 1 -type f ! -name sha256.txt -print0 \
            | sort -z \
            | xargs -0 sha256sum > evidence/sha256.txt

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: justiceforme-documentation-${{ env.SUBMITTED_SHA }}
          path: evidence
          if-no-files-found: error
          retention-days: 30

      - name: Fail when validation is incomplete or invalid
        if: always()
        shell: bash
        run: test "${{ steps.sourcecheck.outputs.status }}" = "0"
